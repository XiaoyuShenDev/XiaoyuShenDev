name: Generate Golden Dragon Trail

on:
  schedule:
    # Regenerate once per day at 00:17 UTC.
    - cron: "17 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    name: Forge contribution trail
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Generate the obsidian-and-gold trail
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: XiaoyuShenDev
          outputs: |
            dist/golden-dragon.svg?palette=github-dark&color_snake=%23EEE7D5&color_dots=%23161A1F,%233A3F46,%236B5630,%23B88A35,%23DFC477

      - name: Publish the generated SVG to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
